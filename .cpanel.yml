# cPanel Git™ Version Control — automated deployment for OPESBooks
#
# How it works: in cPanel → "Git Version Control", create/point a repository at
# this GitHub repo. When you click "Update from Remote" then "Deploy HEAD Commit"
# (or the repo auto-pulls), cPanel runs the tasks below from the repository clone.
#
# ── Setup once (matches DEPLOY.md Option A, recommended) ──────────────────────
#  1. Clone path = your app folder, e.g.  /home/<cpaneluser>/opesbooks
#  2. Point the domain/subdomain Document Root at  …/opesbooks/public
#  3. Create the MySQL DB + a real .env on the server (see DEPLOY.md steps 1 & 4).
#     The .env is NOT in git, so it is preserved across deploys.
#  4. Edit DEPLOYPATH below to your absolute clone path, then commit.
#
# Notes:
#  - No front-end build step (Tailwind/Alpine via CDN) — nothing to compile.
#  - If shell `composer` is unavailable on your host, deploy with vendor/ included
#    (DEPLOY.md step 3B) and remove the composer line below.
---
deployment:
  tasks:
    - export DEPLOYPATH=/home/CHANGE_ME/opesbooks
    - export PATH="$PATH:/usr/local/bin:/opt/cpanel/composer/bin"
    - cd "$DEPLOYPATH"
    # Dependencies (skip gracefully if composer isn't on the host)
    - if command -v composer >/dev/null 2>&1; then composer install --no-dev --optimize-autoloader --no-interaction; fi
    # Database migrations (idempotent; --force = no interactive prompt in prod)
    - php artisan migrate --force
    # Public storage symlink for logos / uploads
    - php artisan storage:link || true
    # Warm the framework caches for production performance
    - php artisan optimize:clear
    - php artisan config:cache
    - php artisan route:cache
    - php artisan view:cache
