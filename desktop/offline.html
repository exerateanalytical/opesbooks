<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>OPESBooks — Hors ligne</title>
  <style>
    body{margin:0;height:100vh;display:flex;align-items:center;justify-content:center;
      font-family:-apple-system,'Segoe UI',sans-serif;
      background:radial-gradient(ellipse 120% 80% at 20% -5%,#1a2d4f,#010048 35%,#050d1a 65%,#0f0a1e);color:#e2e8f0}
    .box{text-align:center;max-width:420px;padding:24px}
    h1{font-size:22px;margin:14px 0 8px;color:#fff}
    p{font-size:14px;color:#94a3b8;line-height:1.6}
    button{margin-top:22px;padding:12px 24px;border:none;border-radius:10px;cursor:pointer;
      font-weight:800;color:#010048;background:linear-gradient(135deg,#C99B0E,#A07C08)}
    .brand{font-weight:900;letter-spacing:2px}.gold{color:#C99B0E}
  </style>
</head>
<body>
  <div class="box">
    <div class="brand" style="font-size:20px">OPES<span class="gold">BOOKS</span></div>
    <h1>Première connexion requise</h1>
    <p>OPESBooks fonctionne hors ligne, mais la toute première ouverture doit se faire avec Internet pour télécharger l'application. Connectez-vous une fois, puis vous pourrez travailler sans réseau.</p>
    <button onclick="location.reload()">Réessayer</button>
  </div>
</body>
</html>
